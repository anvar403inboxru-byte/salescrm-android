name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kodu al
        uses: actions/checkout@v4

      - name: Java quraşdır
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter quraşdır
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Dependencies yüklə
        run: flutter pub get

      - name: APK build et
        run: flutter build apk --release --no-tree-shake-icons

      - name: Versiya al
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: APK-ı artifact kimi yüklə
        uses: actions/upload-artifact@v4
        with:
          name: orbitson-crm-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Release yarat
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ORBITSON CRM v${{ steps.version.outputs.version }}
          body: |
            ## ORBITSON CRM ${{ steps.version.outputs.version }}
            
            APK-nı endirin və telefona quraşdırın.
            
            **Quraşdırma:** APK faylını açın → "Установить" basın
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}